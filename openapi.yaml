openapi: 3.0.3
info:
  title: LeadCatch CRM API
  description: |
    LeadCatch is a powerful CRM backend for lead capture, enrichment, and scoring.

    ## Features
    - Lead CRUD operations
    - AI-powered lead parsing and enrichment
    - Waterfall enrichment (Apollo, Clearbit, Hunter.io, Snov.io)
    - Lead scoring and auto-tagging
    - Duplicate detection
    - CSV import/export
    - Webhook notifications
    - Background job processing

  version: 1.0.0
  contact:
    name: Ahmed Mahmoud
    email: ahmed@leadcatch.io

servers:
  - url: http://localhost:5000
    description: Local development server
  - url: https://api.leadcatch.io
    description: Production server

tags:
  - name: Health
    description: System health and status
  - name: Leads
    description: Lead management operations
  - name: Enrichment
    description: Lead enrichment and scoring
  - name: Tags
    description: Tag management
  - name: Notes
    description: Lead notes management
  - name: Webhooks
    description: Webhook management
  - name: Queue
    description: Background job queue management

paths:
  /:
    get:
      summary: API Status
      tags: [Health]
      responses:
        "200":
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: active
                  system:
                    type: string
                    example: LeadCatch API v1

  /api/health:
    get:
      summary: Detailed Health Check
      tags: [Health]
      responses:
        "200":
          description: System health information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /api/leads:
    post:
      summary: Create Lead Manually
      tags: [Leads]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadRequest"
      responses:
        "201":
          description: Lead created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/leads/{userId}:
    get:
      summary: Get All Leads for User
      tags: [Leads]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [new, contacted, interested, closed]
        - name: platform
          in: query
          schema:
            type: string
        - name: minScore
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 100
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"

  /api/leads/{userId}/{leadId}:
    get:
      summary: Get Single Lead
      tags: [Leads]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: leadId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Lead details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/leads/{leadId}:
    patch:
      summary: Update Lead
      tags: [Leads]
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadRequest"
      responses:
        "200":
          description: Lead updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      summary: Delete Lead
      tags: [Leads]
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Lead deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Lead deleted successfully

  /api/leads/parse:
    post:
      summary: Parse Text with AI
      tags: [Leads]
      description: Extract lead information from free-form text using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, text]
              properties:
                userId:
                  type: string
                  format: uuid
                text:
                  type: string
                  description: Free-form text to parse (email signature, business card, etc.)
      responses:
        "201":
          description: Lead parsed and created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadResponse"

  /api/leads/import:
    post:
      summary: Import Leads from CSV
      tags: [Leads]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, leads]
              properties:
                userId:
                  type: string
                  format: uuid
                leads:
                  type: array
                  items:
                    $ref: "#/components/schemas/ImportLead"
      responses:
        "201":
          description: Leads imported successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  leads:
                    type: array
                    items:
                      $ref: "#/components/schemas/Lead"

  /api/leads/{leadId}/enrich:
    post:
      summary: Enrich Lead Manually
      tags: [Enrichment]
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Lead enriched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadResponse"

  /api/leads/{leadId}/score:
    post:
      summary: Calculate Lead Score
      tags: [Enrichment]
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Score calculated
          content:
            application/json:
              schema:
                type: object
                properties:
                  leadId:
                    type: string
                    format: uuid
                  score:
                    type: integer
                    minimum: 0
                    maximum: 100

  /api/leads/{leadId}/auto-tag:
    post:
      summary: Auto-tag Lead with AI
      tags: [Enrichment]
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Tags generated and assigned
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  tags:
                    type: array
                    items:
                      type: string

  /api/leads/dedupe:
    post:
      summary: Find Duplicate Leads
      tags: [Leads]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Duplicates found
          content:
            application/json:
              schema:
                type: object
                properties:
                  duplicates:
                    type: array
                    items:
                      type: object
                  count:
                    type: integer

  /api/leads/{userId}/export:
    get:
      summary: Export Leads to CSV
      tags: [Leads]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
                format: binary

  /api/leads/bulk:
    post:
      summary: Bulk Operations
      tags: [Leads]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, leadIds]
              properties:
                action:
                  type: string
                  enum: [delete, update]
                leadIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                updates:
                  type: object
                  description: Required for update action
      responses:
        "200":
          description: Bulk operation completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /api/leads/search:
    get:
      summary: Search Leads
      tags: [Leads]
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"

  /api/leads/batch-enrich:
    post:
      summary: Batch Enrich Leads
      tags: [Enrichment]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                  format: uuid
                leadIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                limit:
                  type: integer
                  default: 50
      responses:
        "200":
          description: Batch enrichment results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchEnrichmentResult"

  /api/scrape:
    post:
      summary: Scrape LinkedIn Profile
      tags: [Enrichment]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, targetUrl]
              properties:
                userId:
                  type: string
                  format: uuid
                targetUrl:
                  type: string
                  format: uri
                platform:
                  type: string
                  default: linkedin
      responses:
        "200":
          description: Scrape and enrichment successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadResponse"

  /api/leads/{leadId}/notes:
    post:
      summary: Add Note to Lead
      tags: [Notes]
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, content]
              properties:
                userId:
                  type: string
                  format: uuid
                content:
                  type: string
      responses:
        "201":
          description: Note created
          content:
            application/json:
              schema:
                type: object
                properties:
                  note:
                    $ref: "#/components/schemas/Note"

    get:
      summary: Get Notes for Lead
      tags: [Notes]
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"

  /api/notes/{noteId}:
    delete:
      summary: Delete Note
      tags: [Notes]
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Note deleted

  /api/tags:
    post:
      summary: Create Tag
      tags: [Tags]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, name]
              properties:
                userId:
                  type: string
                  format: uuid
                name:
                  type: string
                color:
                  type: string
                  default: "#6366f1"
      responses:
        "201":
          description: Tag created
          content:
            application/json:
              schema:
                type: object
                properties:
                  tag:
                    $ref: "#/components/schemas/Tag"

  /api/tags/{userId}:
    get:
      summary: Get User Tags
      tags: [Tags]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"

  /api/leads/{leadId}/tags:
    post:
      summary: Add Tags to Lead
      tags: [Tags]
      parameters:
        - name: leadId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tagIds]
              properties:
                tagIds:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: Tags added to lead

  /api/webhooks:
    post:
      summary: Register Webhook
      tags: [Webhooks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, url]
              properties:
                userId:
                  type: string
                  format: uuid
                url:
                  type: string
                  format: uri
                events:
                  type: array
                  items:
                    type: string
                    enum:
                      [
                        lead.created,
                        lead.updated,
                        lead.enriched,
                        lead.deleted,
                        lead.scored,
                      ]
                secret:
                  type: string
      responses:
        "201":
          description: Webhook registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhook:
                    $ref: "#/components/schemas/Webhook"

  /api/webhooks/{userId}:
    get:
      summary: Get User Webhooks
      tags: [Webhooks]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of webhooks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Webhook"

  /api/webhooks/{webhookId}:
    delete:
      summary: Delete Webhook
      tags: [Webhooks]
      parameters:
        - name: webhookId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Webhook deleted

  /api/queue/status:
    get:
      summary: Get Queue Status
      tags: [Queue]
      responses:
        "200":
          description: Queue status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueStatus"

  /api/queue/enrich:
    post:
      summary: Add Lead to Enrichment Queue
      tags: [Queue]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [leadId]
              properties:
                leadId:
                  type: string
                  format: uuid
                priority:
                  type: string
                  enum: [normal, high]
                  default: normal
      responses:
        "200":
          description: Added to queue
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  job:
                    type: object

components:
  schemas:
    Lead:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        job_title:
          type: string
        company:
          type: string
        location:
          type: string
        linkedin_url:
          type: string
          format: uri
        source_platform:
          type: string
        is_enriched:
          type: boolean
        ai_summary:
          type: string
        lead_score:
          type: integer
          minimum: 0
          maximum: 100
        status:
          type: string
          enum: [new, contacted, interested, closed]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateLeadRequest:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        job_title:
          type: string
        company:
          type: string
        location:
          type: string
        linkedin_url:
          type: string
          format: uri

    UpdateLeadRequest:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        job_title:
          type: string
        company:
          type: string
        location:
          type: string
        status:
          type: string
          enum: [new, contacted, interested, closed]

    ImportLead:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
        phone:
          type: string
        job_title:
          type: string
        company:
          type: string
        location:
          type: string
        linkedin_url:
          type: string

    LeadResponse:
      type: object
      properties:
        message:
          type: string
        lead:
          $ref: "#/components/schemas/Lead"

    Note:
      type: object
      properties:
        id:
          type: string
          format: uuid
        lead_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        content:
          type: string
        created_at:
          type: string
          format: date-time

    Tag:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        color:
          type: string
        user_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    Webhook:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        secret:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    QueueStatus:
      type: object
      properties:
        queueLength:
          type: integer
        isProcessing:
          type: boolean
        jobs:
          type: array
          items:
            type: object
            properties:
              leadId:
                type: string
              status:
                type: string
              retries:
                type: integer
              addedAt:
                type: string
                format: date-time

    HealthStatus:
      type: object
      properties:
        status:
          type: string
          example: healthy
        timestamp:
          type: string
          format: date-time
        uptime:
          type: number
        memory:
          type: object
        queue:
          $ref: "#/components/schemas/QueueStatus"

    BatchEnrichmentResult:
      type: object
      properties:
        message:
          type: string
        total:
          type: integer
        successful:
          type: array
          items:
            type: object
        failed:
          type: array
          items:
            type: object
        skipped:
          type: array
          items:
            type: object

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
            code:
              type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Too many requests, please try again later
